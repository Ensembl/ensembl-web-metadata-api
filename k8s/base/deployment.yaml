apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      ensembl.web.api.name: metadata-api-server
  template:
    metadata:
      labels:
        ensembl.web.api.name: metadata-api-server
    spec:
      imagePullSecrets:
        - name: ensemblweb-pull-secret 
      initContainers:
        - name: generate-duckdb
          image: DOCKER_IMAGE
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: metadata-api-configmap
            - secretRef:
                name: metadata-api-secret
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ -s /data/duck_meta.db ]; then
                echo "DuckDB file already exists at /data/duck_meta.db, skipping generation."
              else
                METADATA_DB="mysql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${METADATA_DB_NAME}" \
                python /app/scripts/generate_duckdb.py --outfile /data/duck_meta.db
              fi
          volumeMounts:
            - name: duckdb-storage
              mountPath: /data
      containers:
        - name: metadata-api
          image: DOCKER_IMAGE
          ports:
            - containerPort: 8014
          imagePullPolicy: Always
          env:
            - name: PYTHONPATH
              value: /app/src
          envFrom:
            - configMapRef:
                name: metadata-api-configmap
          volumeMounts:
            - name: duckdb-storage
              mountPath: /data
          command: ["uvicorn"]
          args: ["api.main:app", "--host", "0.0.0.0", "--port", "8014"]
          readinessProbe:
            httpGet:
              path: /health/live
              port: 8014
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/duckdb
              port: 8014
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: duckdb-storage
          persistentVolumeClaim:
            claimName: metadata-duckdb-pvc
